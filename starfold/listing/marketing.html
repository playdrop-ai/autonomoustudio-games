<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
    <title>Starfold Listing Art</title>
    <style>
      :root {
        --night-0: #090712;
        --night-1: #130d26;
        --night-2: #251638;
        --gold: #f0c875;
        --gold-deep: #8b6635;
        --paper: #fff6de;
        --ink-soft: rgba(255, 246, 222, 0.72);
        --sun-a: #ffd67c;
        --sun-b: #e99d2d;
        --moon-a: #d9dbff;
        --moon-b: #7b7de5;
        --wave-a: #b4f3ff;
        --wave-b: #33b0d9;
        --leaf-a: #d2ffe0;
        --leaf-b: #4cc27d;
        --ember-a: #ffc4b0;
        --ember-b: #f1695e;
        --ash-a: #61566a;
        --ash-b: #342f3b;
      }

      * {
        box-sizing: border-box;
      }

      html,
      body {
        margin: 0;
        width: 100%;
        height: 100%;
        overflow: hidden;
        font-family:
          "Avenir Next",
          "Trebuchet MS",
          sans-serif;
        color: var(--paper);
        background:
          radial-gradient(circle at 18% 14%, rgba(94, 78, 165, 0.62) 0%, rgba(94, 78, 165, 0) 28%),
          radial-gradient(circle at 82% 18%, rgba(224, 101, 92, 0.28) 0%, rgba(224, 101, 92, 0) 24%),
          radial-gradient(circle at 68% 84%, rgba(56, 157, 191, 0.18) 0%, rgba(56, 157, 191, 0) 30%),
          linear-gradient(180deg, var(--night-0) 0%, var(--night-1) 50%, var(--night-2) 100%);
      }

      body::before,
      body::after {
        content: "";
        position: absolute;
        border-radius: 999px;
        filter: blur(24px);
        pointer-events: none;
      }

      body::before {
        width: 32vmin;
        height: 32vmin;
        left: -8vmin;
        top: 52%;
        background: rgba(240, 200, 117, 0.16);
      }

      body::after {
        width: 26vmin;
        height: 26vmin;
        right: -7vmin;
        top: 10%;
        background: rgba(87, 139, 255, 0.16);
      }

      body[data-variant="icon"] .portrait-frame,
      body[data-variant="icon"] .landscape-frame,
      body[data-variant="portrait"] .icon-frame,
      body[data-variant="portrait"] .landscape-frame,
      body[data-variant="landscape"] .icon-frame,
      body[data-variant="landscape"] .portrait-frame {
        display: none;
      }

      .frame {
        position: relative;
        width: 100%;
        height: 100%;
      }

      .spark {
        position: absolute;
        width: 8px;
        height: 8px;
        border-radius: 999px;
        background: rgba(255, 246, 222, 0.7);
        box-shadow: 0 0 24px rgba(255, 246, 222, 0.24);
      }

      .board {
        position: absolute;
        border-radius: 38px;
        background:
          linear-gradient(180deg, rgba(255, 255, 255, 0.08) 0%, rgba(255, 255, 255, 0) 24%),
          linear-gradient(180deg, rgba(38, 29, 68, 0.98) 0%, rgba(18, 14, 36, 0.98) 100%);
        box-shadow:
          inset 0 0 0 4px rgba(240, 200, 117, 0.72),
          0 36px 72px rgba(7, 6, 18, 0.46);
      }

      .board::before {
        content: "";
        position: absolute;
        inset: -14px;
        border-radius: 48px;
        background: linear-gradient(145deg, rgba(240, 200, 117, 0.16), rgba(240, 200, 117, 0));
        z-index: -1;
      }

      .title {
        position: absolute;
        margin: 0;
        font-size: clamp(72px, 10vw, 138px);
        line-height: 0.92;
        font-weight: 800;
        letter-spacing: -0.06em;
      }

      .chip {
        position: absolute;
        display: grid;
        place-items: center;
        border-radius: 28px;
        box-shadow:
          0 20px 34px rgba(4, 3, 10, 0.32),
          inset 0 1px 0 rgba(255, 255, 255, 0.28);
      }

      .chip::before {
        content: "";
        position: absolute;
        inset: 4px;
        border-radius: inherit;
        background: linear-gradient(180deg, rgba(255, 255, 255, 0.18), rgba(255, 255, 255, 0));
      }

      .chip svg {
        width: 54%;
        height: 54%;
        position: relative;
        z-index: 1;
      }

      .sun {
        background: linear-gradient(180deg, var(--sun-a), var(--sun-b));
      }

      .moon {
        background: linear-gradient(180deg, var(--moon-a), var(--moon-b));
      }

      .wave {
        background: linear-gradient(180deg, var(--wave-a), var(--wave-b));
      }

      .leaf {
        background: linear-gradient(180deg, var(--leaf-a), var(--leaf-b));
      }

      .ember {
        background: linear-gradient(180deg, var(--ember-a), var(--ember-b));
      }

      .ash {
        background: linear-gradient(180deg, var(--ash-a), var(--ash-b));
      }

      .swipe-trail {
        position: absolute;
        height: 12px;
        border-radius: 999px;
        background: linear-gradient(90deg, rgba(255, 246, 222, 0), rgba(255, 246, 222, 0.88), rgba(255, 246, 222, 0));
        transform: rotate(-18deg);
        filter: blur(1px);
      }

      .icon-frame .board {
        inset: 12%;
      }

      .icon-frame .chip {
        width: 31%;
        height: 31%;
      }

      .portrait-frame .title {
        left: 9%;
        top: 8%;
      }

      .portrait-frame .board {
        left: 8%;
        right: 8%;
        top: 26%;
        bottom: 8%;
      }

      .portrait-frame .chip {
        width: 23%;
        height: 12.5%;
      }

      .landscape-frame .title {
        left: 8%;
        top: 18%;
        max-width: 5ch;
      }

      .landscape-frame .board {
        left: 44%;
        right: 8%;
        top: 15%;
        bottom: 15%;
      }

      .landscape-frame .chip {
        width: 15%;
        height: 22%;
      }
    </style>
  </head>

    <script>
      const params = new URLSearchParams(window.location.search);
      const variant = params.get("variant");
      if (variant === "icon" || variant === "portrait" || variant === "landscape") {
        document.body.dataset.variant = variant;
      }
    </script>
