<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
    <title>Pocket 2048 Listing Art</title>
    <style>
      :root {
        --ink: #2f2722;
        --ink-soft: rgba(47, 39, 34, 0.66);
        --paper: #faf4eb;
        --paper-deep: #ecdcc8;
        --tile-2: linear-gradient(180deg, #f1e1c9 0%, #e3ceb1 100%);
        --tile-8: linear-gradient(180deg, #ffca93 0%, #f59d53 100%);
        --tile-64: linear-gradient(180deg, #ff8799 0%, #e85576 100%);
        --tile-256: linear-gradient(180deg, #9fbfff 0%, #6f93f7 100%);
        --tile-2048: linear-gradient(180deg, #ffef9d 0%, #ffc340 100%);
      }

      * {
        box-sizing: border-box;
      }

      html,
      body {
        margin: 0;
        width: 100%;
        height: 100%;
        overflow: hidden;
        font-family:
          "SF Pro Display",
          "Helvetica Neue",
          Helvetica,
          Arial,
          sans-serif;
        color: var(--ink);
        background:
          radial-gradient(circle at 18% 20%, rgba(255, 255, 255, 0.9) 0%, rgba(255, 255, 255, 0) 24%),
          radial-gradient(circle at 80% 16%, rgba(255, 211, 161, 0.56) 0%, rgba(255, 211, 161, 0) 30%),
          radial-gradient(circle at 56% 92%, rgba(244, 181, 146, 0.38) 0%, rgba(244, 181, 146, 0) 38%),
          linear-gradient(180deg, var(--paper) 0%, #f5eee3 46%, var(--paper-deep) 100%);
      }

      body {
        position: relative;
      }

      body::before,
      body::after {
        content: "";
        position: absolute;
        border-radius: 999px;
        filter: blur(24px);
        pointer-events: none;
      }

      body::before {
        width: 32vmin;
        height: 32vmin;
        left: -6vmin;
        top: 56%;
        background: rgba(255, 216, 166, 0.26);
      }

      body::after {
        width: 24vmin;
        height: 24vmin;
        right: -5vmin;
        top: 10%;
        background: rgba(191, 207, 255, 0.22);
      }

      .frame {
        position: relative;
        width: 100%;
        height: 100%;
      }

      .title {
        position: absolute;
        margin: 0;
        font-size: clamp(54px, 7vw, 110px);
        line-height: 0.92;
        letter-spacing: -0.07em;
        font-weight: 820;
      }

      .subtitle {
        position: absolute;
        margin: 0;
        font-size: clamp(18px, 2vw, 28px);
        line-height: 1.3;
        color: var(--ink-soft);
        max-width: 16ch;
      }

      .board-glow {
        position: absolute;
        border-radius: 42px;
        background: linear-gradient(180deg, rgba(149, 123, 93, 0.2) 0%, rgba(123, 101, 79, 0.28) 100%);
        box-shadow:
          inset 0 1px 0 rgba(255, 255, 255, 0.74),
          0 30px 60px rgba(79, 52, 23, 0.16);
      }

      .tile {
        position: absolute;
        display: grid;
        place-items: center;
        border-radius: 28px;
        font-weight: 820;
        letter-spacing: -0.06em;
        box-shadow:
          inset 0 1px 0 rgba(255, 255, 255, 0.62),
          0 18px 36px rgba(70, 45, 21, 0.14);
      }

      .tile::after {
        content: "";
        position: absolute;
        inset: 3px;
        border-radius: inherit;
        background: linear-gradient(180deg, rgba(255, 255, 255, 0.22) 0%, rgba(255, 255, 255, 0) 48%);
      }

      .tile.low {
        color: #5b4330;
      }

      .tile.high {
        color: #fffaf3;
      }

      .tile.gold {
        color: #513510;
      }

      .tile[data-value="2"] {
        background: var(--tile-2);
      }

      .tile[data-value="8"] {
        background: var(--tile-8);
      }

      .tile[data-value="64"] {
        background: var(--tile-64);
      }

      .tile[data-value="256"] {
        background: var(--tile-256);
      }

      .tile[data-value="2048"] {
        background: var(--tile-2048);
      }

      .icon-frame {
        display: none;
      }

      .portrait-frame {
        display: none;
      }

      .landscape-frame {
        display: none;
      }

      body[data-variant="icon"] .icon-frame {
        display: block;
      }

      body[data-variant="portrait"] .portrait-frame {
        display: block;
      }

      body[data-variant="landscape"] .landscape-frame {
        display: block;
      }

      .icon-frame .board-glow {
        inset: 11%;
      }

      .icon-frame .tile {
        width: 38%;
        height: 38%;
      }

      .portrait-frame .title {
        left: 9%;
        top: 9%;
      }

      .portrait-frame .subtitle {
        left: 9%;
        top: 24%;
      }

      .portrait-frame .board-glow {
        left: 10%;
        right: 10%;
        bottom: 8%;
        top: 34%;
      }

      .portrait-frame .tile {
        width: 26%;
        height: 14%;
        font-size: clamp(34px, 6vw, 62px);
      }

      .landscape-frame .title {
        left: 8%;
        top: 16%;
      }

      .landscape-frame .subtitle {
        left: 8%;
        top: 42%;
      }

      .landscape-frame .board-glow {
        left: 48%;
        right: 8%;
        top: 16%;
        bottom: 16%;
      }

      .landscape-frame .tile {
        width: 17%;
        height: 25%;
        font-size: clamp(30px, 4vw, 60px);
      }
    </style>
  </head>
  <body data-variant="portrait">
    <div class="frame icon-frame">
      <div class="board-glow"></div>
      <div class="tile gold" data-value="2048" style="left: 31%; top: 16%; transform: rotate(-10deg);"></div>
      <div class="tile high" data-value="256" style="left: 17%; top: 36%; transform: rotate(-6deg);"></div>
      <div class="tile high" data-value="64" style="left: 45%; top: 40%; transform: rotate(8deg);"></div>
      <div class="tile low" data-value="2" style="left: 33%; top: 55%; transform: rotate(2deg);"></div>
    </div>

    <div class="frame portrait-frame">
      <h1 class="title">Pocket 2048</h1>
      <p class="subtitle">Swipe calm, glowing number tiles toward a cleaner board.</p>
      <div class="board-glow"></div>
      <div class="tile high" data-value="64" style="left: 14%; top: 46%; transform: rotate(-8deg);">64</div>
      <div class="tile high" data-value="256" style="left: 39%; top: 40%; transform: rotate(4deg);">256</div>
      <div class="tile gold" data-value="2048" style="left: 54%; top: 56%; transform: rotate(7deg);">2048</div>
      <div class="tile low" data-value="2" style="left: 22%; top: 67%; transform: rotate(-3deg);">2</div>
      <div class="tile high" data-value="8" style="left: 61%; top: 38%; transform: rotate(3deg);">8</div>
    </div>

    <div class="frame landscape-frame">
      <h1 class="title">Pocket 2048</h1>
      <p class="subtitle">Portrait-first merging. Clean enough to read at a glance.</p>
      <div class="board-glow"></div>
      <div class="tile high" data-value="64" style="left: 55%; top: 28%; transform: rotate(-6deg);">64</div>
      <div class="tile high" data-value="256" style="left: 69%; top: 22%; transform: rotate(4deg);">256</div>
      <div class="tile gold" data-value="2048" style="left: 72%; top: 49%; transform: rotate(6deg);">2048</div>
      <div class="tile low" data-value="2" style="left: 52%; top: 53%; transform: rotate(-2deg);">2</div>
      <div class="tile high" data-value="8" style="left: 83%; top: 34%; transform: rotate(5deg);">8</div>
    </div>

    <script>
      const params = new URLSearchParams(window.location.search);
      const variant = params.get("variant") || "portrait";
      document.body.dataset.variant = variant;

      if (variant === "icon") {
        for (const tile of document.querySelectorAll(".icon-frame .tile")) {
          tile.textContent = "";
        }
      }
    </script>
  </body>
</html>
