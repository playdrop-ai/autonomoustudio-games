<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Relayline Marketing Art</title>
    <style>
      :root {
        --bg: #040911;
        --bg-2: #081521;
        --panel: rgba(8, 18, 29, 0.72);
        --panel-strong: rgba(11, 22, 36, 0.9);
        --line: rgba(106, 214, 255, 0.18);
        --grid: rgba(77, 171, 208, 0.08);
        --ink: #edf7ff;
        --muted: #89a7bf;
        --cyan: #4af0ff;
        --cyan-deep: #0fb4d3;
        --gold: #ffc84f;
        --gold-deep: #f29b31;
        --shadow: rgba(0, 0, 0, 0.4);
      }

      * {
        box-sizing: border-box;
      }

      html,
      body {
        margin: 0;
        min-height: 100%;
      }

      body {
        padding: 28px;
        background:
          radial-gradient(circle at 18% 8%, rgba(74, 240, 255, 0.14), transparent 18%),
          radial-gradient(circle at 84% 12%, rgba(255, 200, 79, 0.12), transparent 16%),
          radial-gradient(circle at 50% 48%, rgba(10, 45, 62, 0.5), transparent 42%),
          linear-gradient(180deg, var(--bg-2), var(--bg));
        color: var(--ink);
        font-family: "Avenir Next", "Trebuchet MS", sans-serif;
      }

      .sheet {
        display: grid;
        gap: 24px;
        max-width: 2040px;
        margin: 0 auto;
      }

      .sheet__grid {
        display: grid;
        grid-template-columns: repeat(3, minmax(0, 1fr));
        gap: 24px;
      }

      @media (max-width: 1380px) {
        .sheet__grid {
          grid-template-columns: repeat(2, minmax(0, 1fr));
        }
      }

      @media (max-width: 920px) {
        .sheet__grid {
          grid-template-columns: 1fr;
        }
      }

      figure {
        margin: 0;
        display: grid;
        gap: 10px;
      }

      figcaption {
        font-size: 17px;
        letter-spacing: 0.15em;
        text-transform: uppercase;
        color: rgba(233, 245, 255, 0.8);
      }

      .artboard {
        position: relative;
        overflow: hidden;
        border-radius: 40px;
        background:
          radial-gradient(circle at 18% 16%, rgba(74, 240, 255, 0.18), transparent 20%),
          radial-gradient(circle at 82% 18%, rgba(255, 200, 79, 0.14), transparent 18%),
          linear-gradient(180deg, rgba(9, 19, 31, 0.98), rgba(5, 10, 17, 0.98));
        box-shadow:
          0 34px 100px var(--shadow),
          inset 0 0 0 1px rgba(160, 221, 255, 0.12);
        isolation: isolate;
      }

      .artboard::before,
      .artboard::after {
        content: "";
        position: absolute;
        inset: 0;
        pointer-events: none;
      }

      .artboard::before {
        background:
          radial-gradient(circle at 15% 15%, rgba(74, 240, 255, 0.12), transparent 12%),
          radial-gradient(circle at 84% 16%, rgba(255, 200, 79, 0.1), transparent 14%),
          linear-gradient(90deg, transparent 0 14%, rgba(255, 255, 255, 0.02) 14% 14.4%, transparent 14.4% 29.4%, rgba(255, 255, 255, 0.02) 29.4% 29.8%, transparent 29.8% 100%),
          linear-gradient(180deg, transparent 0 14%, rgba(255, 255, 255, 0.02) 14% 14.4%, transparent 14.4% 29.4%, rgba(255, 255, 255, 0.02) 29.4% 29.8%, transparent 29.8% 100%);
        opacity: 0.55;
      }

      .artboard::after {
        background:
          linear-gradient(180deg, rgba(0, 0, 0, 0.05), transparent 16%, transparent 82%, rgba(0, 0, 0, 0.3)),
          radial-gradient(circle at center, transparent 54%, rgba(2, 6, 10, 0.2) 100%);
        mix-blend-mode: screen;
      }

      .artboard__stage {
        position: absolute;
        inset: 6.5%;
        border-radius: 34px;
        background:
          linear-gradient(180deg, rgba(12, 24, 36, 0.78), rgba(7, 15, 24, 0.88)),
          linear-gradient(180deg, rgba(255, 255, 255, 0.02), transparent);
        box-shadow:
          0 24px 56px rgba(0, 0, 0, 0.3),
          inset 0 0 0 1px rgba(102, 190, 233, 0.1);
      }

      .artboard__stage::before {
        content: "";
        position: absolute;
        inset: 0;
        background:
          radial-gradient(circle at 18% 20%, rgba(74, 240, 255, 0.18), transparent 18%),
          radial-gradient(circle at 74% 74%, rgba(255, 200, 79, 0.1), transparent 18%);
        opacity: 0.95;
      }

      .artboard__glow {
        position: absolute;
        border-radius: 999px;
        filter: blur(8px);
        opacity: 0.9;
      }

      .artboard__glow--cyan {
        background: linear-gradient(90deg, rgba(74, 240, 255, 0), rgba(74, 240, 255, 0.78), rgba(74, 240, 255, 0));
        box-shadow: 0 0 48px rgba(74, 240, 255, 0.38);
      }

      .artboard__glow--gold {
        background: linear-gradient(90deg, rgba(255, 200, 79, 0), rgba(255, 200, 79, 0.88), rgba(255, 200, 79, 0));
        box-shadow: 0 0 44px rgba(255, 200, 79, 0.32);
      }

      .artboard__route {
        position: absolute;
        border-radius: 999px;
        border: 2px solid rgba(74, 240, 255, 0.42);
        box-shadow:
          0 0 24px rgba(74, 240, 255, 0.24),
          inset 0 0 0 1px rgba(255, 255, 255, 0.08);
      }

      .artboard__route::after {
        content: "";
        position: absolute;
        inset: 10%;
        border-radius: inherit;
        border: 1px solid rgba(255, 200, 79, 0.34);
      }

      .artboard__route-dot {
        position: absolute;
        width: 20px;
        height: 20px;
        border-radius: 50%;
        background: radial-gradient(circle at 30% 30%, #fff 0 16%, var(--gold) 22% 58%, var(--gold-deep) 100%);
        box-shadow:
          0 0 18px rgba(255, 200, 79, 0.7),
          0 0 0 8px rgba(255, 200, 79, 0.1);
      }

      .artboard__route-dot--cyan {
        background: radial-gradient(circle at 30% 30%, #fff 0 18%, var(--cyan) 24% 60%, var(--cyan-deep) 100%);
        box-shadow:
          0 0 18px rgba(74, 240, 255, 0.7),
          0 0 0 8px rgba(74, 240, 255, 0.1);
      }

      .artboard__screen {
        position: absolute;
        overflow: hidden;
        border-radius: 30px;
        box-shadow:
          0 24px 54px rgba(0, 0, 0, 0.28),
          inset 0 0 0 1px rgba(255, 255, 255, 0.12);
      }

      .artboard__screen img {
        width: 100%;
        height: 100%;
        display: block;
        object-fit: cover;
        filter: saturate(1.12) contrast(1.05) brightness(1.02);
      }

      .artboard__screen::after {
        content: "";
        position: absolute;
        inset: 0;
        background:
          linear-gradient(180deg, rgba(255, 255, 255, 0.18), transparent 16%, transparent 82%, rgba(0, 0, 0, 0.28)),
          linear-gradient(90deg, rgba(255, 255, 255, 0.08), transparent 24%, transparent 76%, rgba(74, 240, 255, 0.08));
        mix-blend-mode: screen;
      }

      .title-band {
        position: absolute;
        display: grid;
        place-items: center;
        text-align: center;
        border-radius: 30px;
        background:
          linear-gradient(180deg, rgba(255, 255, 255, 0.12), rgba(255, 255, 255, 0)),
          rgba(7, 14, 23, 0.9);
        box-shadow:
          0 24px 54px rgba(0, 0, 0, 0.34),
          inset 0 0 0 1px rgba(255, 255, 255, 0.12);
        backdrop-filter: blur(18px);
      }

      .title-band__title {
        display: block;
        font-family: "Avenir Next Condensed", "Franklin Gothic Medium", "Trebuchet MS", sans-serif;
        font-size: 86px;
        line-height: 0.84;
        font-weight: 900;
        letter-spacing: 0.045em;
        color: #f3fbff;
        text-transform: uppercase;
        text-shadow:
          0 16px 36px rgba(0, 0, 0, 0.32),
          0 0 20px rgba(74, 240, 255, 0.08);
      }

      .title-band__eyebrow {
        display: block;
        margin-bottom: 10px;
        font-size: 24px;
        letter-spacing: 0.24em;
        color: rgba(160, 212, 231, 0.84);
        text-transform: uppercase;
      }

      .tagline {
        position: absolute;
        display: inline-flex;
        align-items: center;
        gap: 10px;
        padding: 12px 16px;
        border-radius: 999px;
        background: rgba(11, 22, 35, 0.82);
        color: rgba(228, 245, 255, 0.88);
        font-size: 19px;
        letter-spacing: 0.08em;
        text-transform: uppercase;
        box-shadow:
          0 20px 38px rgba(0, 0, 0, 0.24),
          inset 0 0 0 1px rgba(255, 255, 255, 0.1);
      }

      .tagline::before {
        content: "";
        width: 10px;
        height: 10px;
        border-radius: 50%;
        background: var(--cyan);
        box-shadow: 0 0 14px rgba(74, 240, 255, 0.78);
      }

      .badge-strip {
        position: absolute;
        display: inline-flex;
        align-items: center;
        gap: 14px;
        padding: 12px 16px;
        border-radius: 22px;
        background: rgba(11, 23, 37, 0.82);
        box-shadow:
          0 20px 38px rgba(0, 0, 0, 0.2),
          inset 0 0 0 1px rgba(255, 255, 255, 0.08);
      }

      .badge-strip__label {
        font-size: 13px;
        font-weight: 800;
        letter-spacing: 0.18em;
        text-transform: uppercase;
        color: rgba(161, 203, 225, 0.74);
      }

      .badge-strip__value {
        font-size: 18px;
        font-weight: 800;
        letter-spacing: 0.1em;
        text-transform: uppercase;
        color: #f5fbff;
      }

      .trail {
        position: absolute;
        display: flex;
        align-items: center;
        gap: 8px;
      }

      .trail__bar {
        width: 220px;
        height: 10px;
        border-radius: 999px;
        background: linear-gradient(90deg, rgba(74, 240, 255, 0), rgba(74, 240, 255, 0.8), rgba(255, 200, 79, 0.92));
        box-shadow: 0 0 22px rgba(74, 240, 255, 0.24);
      }

      .trail__spark {
        width: 16px;
        height: 16px;
        border-radius: 50%;
        background: radial-gradient(circle at 30% 30%, #fff 0 20%, var(--cyan) 26% 64%, var(--cyan-deep) 100%);
        box-shadow: 0 0 18px rgba(74, 240, 255, 0.68);
      }

      .hero-landscape {
        width: 1600px;
        height: 900px;
      }

      .hero-portrait {
        width: 1080px;
        height: 1920px;
      }

      .icon {
        width: 1024px;
        height: 1024px;
      }

        left: 10%;

        bottom: 18%;
      }

      .hero-portrait .artboard__screen {
        left: 11%;
        right: 11%;
        top: 13%;
        bottom: 13%;

        inset: 12%;

        right: 11.5%;

      .candidate-a .badge-strip {

      .candidate-c .badge-strip {

      }

      .candidate-a .artboard__glow--cyan {
        left: 6%;

      }

      .candidate-b .artboard__glow--cyan {
        left: 17%;

      }

      .candidate-c .artboard__glow--cyan {

      .candidate-a .artboard__glow--gold {

      }

      .candidate-a .artboard__route {
        left: 18%;

      }

      .candidate-b .artboard__route {
        left: 26%;

      }

      .candidate-c .artboard__route {

      .candidate-b .artboard__route-dot--cyan {

      }

      .candidate-c .artboard__route-dot--cyan {

      }

      .candidate-a .artboard__route-dot--gold {

      }

      .candidate-b .artboard__route-dot--gold {
        right: 14%;

      }

      .candidate-c .artboard__route-dot--gold {
        right: 15%;

      }

      .hero-portrait.candidate-a .title-band,
      .hero-portrait.candidate-b .title-band,
      .hero-portrait.candidate-c .title-band {
        left: 14%;
        right: 14%;

        height: 14.5%;
        transform: none;
      }

      .hero-portrait.candidate-a .title-band {
        top: 13%;
      }

      .hero-portrait.candidate-b .title-band {
        top: 12.5%;
      }

      .hero-portrait.candidate-c .title-band {

      .hero-portrait .title-band__title {
        font-size: 106px;
      }

      .hero-portrait.candidate-a .tagline {

      }

      .hero-portrait.candidate-b .tagline {

      }

      .hero-portrait.candidate-c .tagline {

      .hero-portrait.candidate-a .badge-strip {
        left: 14%;

      }

      .hero-portrait.candidate-b .badge-strip {

      }

      .hero-portrait.candidate-c .badge-strip {

      .hero-portrait.candidate-a .artboard__route,
      .hero-portrait.candidate-b .artboard__route,
      .hero-portrait.candidate-c .artboard__route {
        left: 22%;

      .hero-portrait.candidate-a .artboard__screen,
      .hero-portrait.candidate-b .artboard__screen,

      .hero-portrait.candidate-a .artboard__glow--cyan,

      .hero-portrait.candidate-a .artboard__glow--gold,

      .icon .title-band,
      .icon .tagline,

      .icon .artboard__route {
        left: 24%;

      .icon .artboard__route-dot--cyan {

      }

      .icon.candidate-c .artboard__screen {
        transform: rotate(3deg) scale(1.01);
      }

      .icon .icon-glyph {
        position: absolute;
        left: 50%;
        top: 50%;
        transform: translate(-50%, -50%);
        width: 42%;
        height: 42%;
        border-radius: 28%;
        border: 2px solid rgba(255, 255, 255, 0.14);
        background:
          radial-gradient(circle at 50% 50%, rgba(11, 22, 35, 0.18), rgba(11, 22, 35, 0.92) 66%),
          linear-gradient(180deg, rgba(74, 240, 255, 0.16), rgba(255, 200, 79, 0.12));
        box-shadow:
          0 0 0 10px rgba(74, 240, 255, 0.08),
          0 0 28px rgba(74, 240, 255, 0.18);
      }

      .icon .icon-glyph::before,
      .icon .icon-glyph::after {
        content: "";
        position: absolute;
        left: 50%;
        transform: translateX(-50%);
        border-radius: 999px;
      }

      .icon .icon-glyph::before {
        top: 14%;
        width: 18%;
        height: 72%;
        background: linear-gradient(180deg, rgba(74, 240, 255, 0.95), rgba(255, 200, 79, 0.92));
        box-shadow: 0 0 24px rgba(74, 240, 255, 0.38);
      }

      .icon .icon-glyph::after {
        top: 50%;
        width: 72%;
        height: 18%;
        transform: translate(-50%, -50%);
        background: linear-gradient(90deg, rgba(74, 240, 255, 0.12), rgba(74, 240, 255, 0.86), rgba(255, 200, 79, 0.84));
        box-shadow: 0 0 28px rgba(255, 200, 79, 0.22);
      }

      .icon .icon-node {
        position: absolute;
        width: 18%;
        height: 18%;
        border-radius: 50%;
        background: radial-gradient(circle at 32% 32%, #fff 0 16%, var(--gold) 26% 62%, var(--gold-deep) 100%);
        box-shadow:
          0 0 22px rgba(255, 200, 79, 0.68),
          0 0 0 14px rgba(255, 200, 79, 0.08);
      }

      .icon .icon-node--source {

        right: 12%;

          0 0 22px rgba(74, 240, 255, 0.68),
          0 0 0 14px rgba(74, 240, 255, 0.08);
      }

      .icon .icon-grid {
        position: absolute;
        inset: 0;
        background-image:
          linear-gradient(rgba(255, 255, 255, 0.04) 1px, transparent 1px),
          linear-gradient(90deg, rgba(255, 255, 255, 0.04) 1px, transparent 1px);
        background-size: 66px 66px;
        opacity: 0.55;
        mask-image: radial-gradient(circle at center, black 32%, transparent 78%);
      }

      .review-grid {
        display: grid;
        gap: 18px;
      }

      .review-grid__row {
        display: grid;
        grid-template-columns: repeat(3, minmax(0, 1fr));
        gap: 18px;
      }

      .review-grid__row .artboard {
        width: 100%;
      }

      .review-grid__row--landscape .artboard {
        aspect-ratio: 16 / 9;
      }

      .review-grid__row--portrait .artboard {
        aspect-ratio: 9 / 16;
      }

      .review-grid__row--icon .artboard {
        aspect-ratio: 1 / 1;
      }

  <body>
    <main class="sheet">
      <section class="review-grid" aria-label="Relayline marketing art candidates">
        <div class="review-grid__row review-grid__row--landscape">
          <figure>
            <figcaption>Landscape candidate A</figcaption>
            <div class="artboard hero-landscape candidate-a" id="hero-landscape-a">
              <div class="artboard__stage"></div>
              <div class="artboard__screen">
                <img src="./relayline_1280x720-screenshot-1.png" alt="" />
              </div>
              <div class="artboard__glow artboard__glow--cyan"></div>
              <div class="artboard__glow artboard__glow--gold"></div>
              <div class="artboard__route">
                <span class="artboard__route-dot artboard__route-dot--cyan"></span>
                <span class="artboard__route-dot artboard__route-dot--gold"></span>
              </div>
              <div class="title-band">
                <div>
                  <span class="title-band__eyebrow">Circuit puzzle</span>
                  <span class="title-band__title">Relayline</span>
                </div>
              </div>
              <div class="badge-strip">
                <span class="badge-strip__label">Route</span>
                <span class="badge-strip__value">Source to relay</span>
              </div>
              <div class="tagline">Reveal safe cells. Flag shorts. Burn three surges.</div>
            </div>
          </figure>

          <figure>
            <figcaption>Landscape candidate B</figcaption>
            <div class="artboard hero-landscape candidate-b" id="hero-landscape-b">
              <div class="artboard__stage"></div>
              <div class="artboard__screen">
                <img src="./relayline_1280x720-screenshot-1.png" alt="" />
              </div>
              <div class="artboard__glow artboard__glow--cyan"></div>
              <div class="artboard__glow artboard__glow--gold"></div>
              <div class="artboard__route">
                <span class="artboard__route-dot artboard__route-dot--cyan"></span>
                <span class="artboard__route-dot artboard__route-dot--gold"></span>
              </div>
              <div class="title-band">
                <div>
                  <span class="title-band__eyebrow">Circuit puzzle</span>
                  <span class="title-band__title">Relayline</span>
                </div>
              </div>
              <div class="badge-strip">
                <span class="badge-strip__label">Route</span>
                <span class="badge-strip__value">Source to relay</span>
              </div>
              <div class="tagline">Read the grid. Protect the line. Finish before the third surge.</div>
            </div>
          </figure>
