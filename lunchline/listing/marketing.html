<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Lunchline Marketing Art</title>
    <style>
      :root {
        --cream: #fbefda;
        --cream-deep: #f3dfbd;
        --coral: #ef7d58;
        --egg: #f3c863;
        --avocado: #7ab96d;
        --cucumber: #55a98d;
        --wood: #6a3b24;
        --wood-deep: #472514;
        --ink: #4b2e20;
        --shadow: rgba(61, 31, 18, 0.28);
        --panel: rgba(255, 248, 236, 0.92);
      }

      * {
        box-sizing: border-box;
      }

      body {
        margin: 0;
        min-height: 100vh;
        padding: 32px;
        display: grid;
        place-items: center;
        background:
          radial-gradient(circle at top, rgba(255, 255, 255, 0.25), transparent 22%),
          linear-gradient(180deg, #f5c18b 0%, #efa66e 24%, #7a4324 24.2%, #4d2a18 100%);
        font-family: "Avenir Next", "Trebuchet MS", sans-serif;
        color: white;
      }

      .sheet {
        display: grid;
        gap: 24px;
      }

      .row {
        display: flex;
        gap: 24px;
        align-items: flex-start;
      }

      figure {
        margin: 0;
        display: grid;
        gap: 12px;
      }

      figcaption {
        font-size: 20px;
        font-weight: 700;
        letter-spacing: 0.08em;
        text-transform: uppercase;
        color: rgba(255, 248, 236, 0.9);
      }

      .artboard {
        position: relative;
        overflow: hidden;
        border-radius: 36px;
        background:
          radial-gradient(circle at 18% 18%, rgba(255, 255, 255, 0.42), transparent 22%),
          linear-gradient(180deg, rgba(255, 255, 255, 0.26), rgba(255, 255, 255, 0.02)),
          linear-gradient(180deg, #f8d3a9 0%, #f1b278 24%, #9c5a33 24.2%, #5a301c 100%);
        box-shadow:
          0 36px 100px rgba(0, 0, 0, 0.34),
          inset 0 0 0 1px rgba(255, 255, 255, 0.14);
      }

      .artboard::before,
      .artboard::after {
        content: "";
        position: absolute;
        inset: 0;
      }

      .artboard::before {
        background:
          radial-gradient(circle at 82% 10%, rgba(255, 255, 255, 0.58), transparent 18%),
          repeating-linear-gradient(
            90deg,
            rgba(255, 255, 255, 0.03) 0 22px,
            rgba(76, 38, 21, 0.04) 22px 44px
          );
        opacity: 0.7;
      }

      .artboard::after {
        background: linear-gradient(180deg, transparent 72%, rgba(42, 20, 12, 0.2) 100%);
      }

      .hero-landscape {
        width: 1600px;
        height: 900px;
      }

      .hero-portrait {
        width: 1080px;
        height: 1920px;
      }

      .icon {
        width: 1024px;
        height: 1024px;
      }

      .stage-panel,
      .title-band,
      .order-card,
      .board-shot,
      .token,
      .ticket-strip,
      .steam,
      .icon-focal {
        position: absolute;
      }

      .stage-panel {
        inset: 7%;
        border-radius: 38px;
        background:
          linear-gradient(180deg, rgba(255, 248, 236, 0.88), rgba(247, 229, 203, 0.92));
        box-shadow:
          0 24px 48px rgba(74, 42, 25, 0.18),
          inset 0 0 0 1px rgba(123, 89, 69, 0.12);
      }

      .title-band {
        z-index: 3;
        border-radius: 28px;
        background:
          linear-gradient(180deg, rgba(255, 255, 255, 0.14), rgba(255, 255, 255, 0)),
          rgba(67, 39, 24, 0.82);
        box-shadow:
          0 24px 56px rgba(43, 20, 12, 0.3),
          inset 0 0 0 1px rgba(255, 255, 255, 0.12);
        backdrop-filter: blur(20px);
      }

      .title-lockup {
        position: absolute;
        inset: 0;
        display: grid;
        place-items: center;
        text-align: center;
      }

      .title-lockup span {
        display: block;
        font-family: "Avenir Next Condensed", "Trebuchet MS", sans-serif;
        font-size: 150px;
        font-weight: 900;
        letter-spacing: 0.06em;
        line-height: 0.88;
        text-transform: uppercase;
        color: #fff8ee;
        text-shadow:
          0 18px 38px rgba(0, 0, 0, 0.28),
          0 2px 0 rgba(255, 255, 255, 0.12);
      }

      .board-shot {
        z-index: 2;
        border-radius: 34px;
        overflow: hidden;
        box-shadow:
          0 24px 52px rgba(68, 38, 22, 0.22),
          inset 0 0 0 1px rgba(255, 255, 255, 0.16);
      }

      .board-shot img {
        width: 100%;
        height: 100%;
        object-fit: cover;
        display: block;
        filter: saturate(1.04) contrast(1.02) brightness(1.01);
      }

      .board-shot::after {
        content: "";
        position: absolute;
        inset: 0;
        background:
          linear-gradient(180deg, rgba(255, 255, 255, 0.14), transparent 18%, transparent 82%, rgba(53, 29, 18, 0.12)),
          linear-gradient(90deg, rgba(255, 255, 255, 0.08), transparent 22%, transparent 78%, rgba(83, 44, 25, 0.1));
      }

      .order-card {
        z-index: 4;
        display: grid;
        gap: 18px;
        padding: 22px;
        border-radius: 30px;
        background:
          linear-gradient(180deg, rgba(255, 250, 240, 0.98), rgba(248, 232, 207, 0.94));
        box-shadow:
          0 24px 48px rgba(80, 44, 24, 0.24),
          inset 0 0 0 1px rgba(123, 89, 69, 0.12);
      }

      .order-top {
        display: flex;
        align-items: end;
        justify-content: space-between;
        gap: 16px;
      }

      .order-brand {
        font-family: "Avenir Next Condensed", "Trebuchet MS", sans-serif;
        font-size: 62px;
        font-weight: 900;
        color: var(--ink);
        line-height: 0.88;
      }

      .order-pill {
        font-size: 22px;
        font-weight: 800;
        letter-spacing: 0.12em;
        text-transform: uppercase;
        color: rgba(75, 46, 32, 0.66);
      }

      .meter {
        height: 20px;
        border-radius: 999px;
        overflow: hidden;
        background: rgba(239, 125, 88, 0.16);
      }

      .meter::after {
        content: "";
        display: block;
        width: 72%;
        height: 100%;
        border-radius: inherit;
        background: linear-gradient(90deg, #ee6d56, #f09b6f 58%, #ffd6a0);
      }

      .order-grid {
        display: grid;
        grid-template-columns: repeat(2, minmax(0, 1fr));
        gap: 16px;
      }

      .order-slot {
        display: flex;
        align-items: center;
        gap: 14px;
        padding: 16px;
        border-radius: 22px;
        background: rgba(255, 255, 255, 0.8);
        box-shadow: inset 0 0 0 1px rgba(96, 55, 34, 0.08);
      }

      .order-icon {
        width: 72px;
        height: 72px;
        border-radius: 24px;
        flex: 0 0 auto;
        position: relative;
        overflow: hidden;
        box-shadow:
          inset 0 -4px 0 rgba(60, 31, 18, 0.14),
          0 10px 18px rgba(96, 55, 34, 0.1);
      }

      .order-icon::before,
      .order-icon::after {
        content: "";
        position: absolute;
      }

      .order-icon.salmon {
        background:
          radial-gradient(circle at top, rgba(255, 255, 255, 0.42), transparent 44%),
          linear-gradient(180deg, #ff9c7d 0%, var(--coral) 100%);
      }

      .order-icon.salmon::before {
        inset: 28% 18%;
        border-top: 6px solid rgba(255, 250, 244, 0.88);
        border-bottom: 6px solid rgba(255, 250, 244, 0.74);
        border-radius: 999px;
      }

      .order-icon.salmon::after {
        inset: 15% auto auto 20%;
        width: 56%;
        height: 14%;
        border-radius: 999px;
        background: rgba(255, 255, 255, 0.42);
      }

      .order-icon.egg {
        background:
          radial-gradient(circle at top, rgba(255, 255, 255, 0.38), transparent 42%),
          linear-gradient(180deg, #fff6d5 0%, #fff1be 100%);
      }

      .order-icon.egg::before {
        inset: 24% 18%;
        border-radius: 18px;
        background: linear-gradient(180deg, #ffe28f 0%, var(--egg) 100%);
      }

      .order-icon.egg::after {
        inset: 17% 16%;
        border-radius: 22px;
        box-shadow: inset 0 0 0 5px rgba(255, 255, 255, 0.92);
      }

      .order-icon.avocado {
        background:
          radial-gradient(circle at top, rgba(255, 255, 255, 0.38), transparent 42%),
          linear-gradient(180deg, #a6db8b 0%, var(--avocado) 100%);
      }

      .order-icon.avocado::before {
        inset: 18%;
        border-radius: 999px 999px 64% 64%;
        background: linear-gradient(180deg, #d7f3bf 0%, #94cf78 100%);
      }

      .order-icon.avocado::after {
        inset: 38% 36%;
        border-radius: 999px;
        background: #75502e;
      }

      .order-count {
        margin-left: auto;
        font-family: "Avenir Next Condensed", "Trebuchet MS", sans-serif;
        font-size: 44px;
        font-weight: 900;
        color: var(--ink);
      }

      .token {
        border-radius: 50%;
        box-shadow:
          0 16px 28px rgba(60, 31, 18, 0.18),
          inset 0 0 0 12px rgba(255, 255, 255, 0.64);
      }

      .token::before,
      .token::after {
        content: "";
        position: absolute;
        inset: 0;
        border-radius: inherit;
      }

      .token.salmon {
        background: radial-gradient(circle at 50% 50%, #ffb494, var(--coral) 68%);
      }

      .token.salmon::before {
        inset: 38% 18%;
        border-top: 6px solid rgba(255, 250, 244, 0.9);
        border-bottom: 6px solid rgba(255, 250, 244, 0.74);
        border-radius: 999px;
      }

      .token.salmon::after {
        inset: 22% 24% auto 24%;
        height: 12%;
        background: rgba(255, 255, 255, 0.38);
        border-radius: 999px;
      }

      .token.egg {
        background: radial-gradient(circle at 50% 50%, #fff6d7, #fff0ba 70%);
      }

      .token.egg::before {
        inset: 22%;
        background: linear-gradient(180deg, #ffe28f 0%, var(--egg) 100%);
        border-radius: 50%;
      }

      .token.egg::after {
        inset: 14%;
        box-shadow: inset 0 0 0 8px rgba(255, 255, 255, 0.9);
      }

      .token.avocado {
        background: radial-gradient(circle at 50% 50%, #cfe9bc, var(--avocado) 72%);
      }

      .token.avocado::before {
        inset: 18%;
        background: rgba(224, 248, 203, 0.9);
        border-radius: 50%;
      }

      .token.avocado::after {
        inset: 40%;
        background: #75502e;
      }

      .token.cucumber {
        background: radial-gradient(circle at 50% 50%, #c9f0e0, var(--cucumber) 72%);
      }

      .token.cucumber::before {
        inset: 18%;
        border: 8px solid rgba(225, 255, 243, 0.84);
      }

      .token.cucumber::after {
        inset: 34%;
        border: 6px solid rgba(225, 255, 243, 0.76);
      }

      .ticket-strip {
        z-index: 1;
        border-radius: 999px;
        background:
          linear-gradient(180deg, rgba(255, 255, 255, 0.28), rgba(255, 255, 255, 0.08)),
          rgba(255, 248, 236, 0.2);
        box-shadow:
          0 18px 32px rgba(58, 29, 17, 0.12),
          inset 0 0 0 1px rgba(255, 255, 255, 0.14);
      }

      .steam {
        z-index: 0;
        border-radius: 999px;
        background: radial-gradient(circle, rgba(255, 255, 255, 0.34), transparent 72%);
        filter: blur(10px);
      }

      .variant-a .title-band {
        left: 15%;
        right: 15%;
        top: 36%;
        height: 20%;
      }

      .variant-a .board-shot {
        right: 6%;
        top: 14%;
        width: 48%;
        height: 64%;
        transform: rotate(5deg);
      }

      .variant-a .order-card {
        left: 6%;
        top: 16%;
        width: 34%;
      }

      .variant-a .token.salmon {
        width: 150px;
        height: 150px;
        left: 10%;
        bottom: 8%;
      }

      .variant-a .token.egg {
        width: 132px;
        height: 132px;
        left: 22%;
        bottom: 14%;
      }

      .variant-a .token.avocado {
        width: 110px;
        height: 110px;
        right: 10%;
        bottom: 10%;
      }

      .variant-a .ticket-strip {
        left: 18%;
        right: 12%;
        top: 10%;
        height: 62px;
      }

      .variant-b .stage-panel {
        inset: 6%;
      }

      .variant-b .title-band {
        left: 12%;
        right: 12%;
        top: 39%;
        height: 18%;
      }

      .variant-b .board-shot {
        left: 11%;
        right: 11%;
        bottom: 10%;
        height: 46%;
      }

      .variant-b .order-card {
        left: 9%;
        top: 12%;
        width: 38%;
        transform: rotate(-5deg);
      }

      .variant-b .token.cucumber {
        width: 150px;
        height: 150px;
        right: 14%;
        top: 16%;
      }

      .variant-b .token.salmon {
        width: 126px;
        height: 126px;
        right: 7%;
        top: 31%;
      }

      .variant-b .token.egg {
        width: 120px;
        height: 120px;
        left: 16%;
        bottom: 12%;
      }

      .variant-b .ticket-strip {
        left: 20%;
        right: 20%;
        top: 8%;
        height: 56px;
      }

      .variant-c .title-band {
        left: 26%;
        right: 10%;
        top: 52%;
        height: 16%;
      }

      .variant-c .board-shot {
        left: 8%;
        top: 13%;
        width: 40%;
        height: 72%;
      }

      .variant-c .order-card {
        right: 7%;
        top: 16%;
        width: 36%;
      }

      .variant-c .token.avocado {
        width: 146px;
        height: 146px;
        right: 12%;
        bottom: 12%;
      }

      .variant-c .token.egg {
        width: 120px;
        height: 120px;
        right: 23%;
        bottom: 24%;
      }

      .variant-c .token.salmon {
        width: 110px;
        height: 110px;
        left: 22%;
        top: 8%;
      }

      .variant-c .ticket-strip {
        left: 8%;
        right: 8%;
        bottom: 7%;
        height: 48px;
      }

      .hero-portrait.variant-b .title-band {
        left: 8%;
        right: 8%;
        top: 44%;
        height: 15%;
      }

      .hero-portrait.variant-b .title-lockup span {
        font-size: 122px;
      }

      .hero-portrait.variant-b .board-shot {
        left: 8%;
        right: 8%;
        bottom: 11%;
        height: 40%;
      }

      .hero-portrait.variant-b .order-card {
        left: 9%;
        right: 9%;
        top: 13%;
        width: auto;
        transform: none;
      }

      .hero-portrait.variant-b .token.cucumber {
        width: 150px;
        height: 150px;
        right: 10%;
        top: 31%;
      }

      .hero-portrait.variant-b .token.salmon {
        width: 122px;
        height: 122px;
        left: 12%;
        top: 58%;
      }

      .hero-portrait.variant-b .token.egg {
        width: 128px;
        height: 128px;
        right: 12%;
        bottom: 18%;
      }

      .hero-portrait.variant-b .ticket-strip {
        left: 13%;
        right: 13%;
        top: 8%;
        height: 56px;
      }

      .hero-portrait.variant-b .steam {
        width: 360px;
        height: 220px;
        left: 50%;
        top: 30%;
        transform: translateX(-50%);
      }

      .icon .stage-panel {
        inset: 8%;
        border-radius: 34px;
      }

      .icon .icon-focal {
        inset: 14%;
        border-radius: 42px;
        background:
          linear-gradient(180deg, rgba(255, 250, 240, 0.96), rgba(248, 232, 207, 0.9));
        box-shadow:
          0 28px 58px rgba(63, 34, 20, 0.24),
          inset 0 0 0 1px rgba(123, 89, 69, 0.12);
      }

      .icon .icon-focal .board-shot {
        left: 8%;
        right: 8%;
        bottom: 8%;
        height: 38%;
        border-radius: 28px;
      }

      .icon .icon-focal .order-card {
        left: 8%;
        right: 8%;
        top: 8%;
        width: auto;
        transform: none;
      }

      .icon .icon-order {
        gap: 14px;
        padding: 18px;
      }

      .icon .icon-order .order-grid {
        gap: 12px;
      }

      .icon .icon-order .order-slot {
        padding: 14px;
      }

      .icon .token.salmon {
        width: 140px;
        height: 140px;
        left: 10%;
        bottom: 18%;
      }

      .icon .token.egg {
        width: 128px;
        height: 128px;
        right: 12%;
        top: 18%;
      }

      .icon .token.avocado {
        width: 120px;
        height: 120px;
        right: 8%;
        bottom: 13%;
      }
    </style>
  </head>
  <body>
    <main class="sheet">
      <section class="row">
        <figure>
          <section class="artboard hero-landscape variant-a" id="hero-landscape-a">
            <div class="stage-panel"></div>
            <div class="ticket-strip"></div>
            <div class="steam" style="width: 320px; height: 160px; left: 18%; top: 10%"></div>
            <div class="board-shot">
              <img src="./lunchline_1280x720-screenshot-1.png" alt="" />
            </div>
            <div class="order-card">
              <div class="order-top">
                <span class="order-brand">Lunchline</span>
                <span class="order-pill">Rush</span>
              </div>
              <div class="meter"></div>
              <div class="order-grid">
                <div class="order-slot">
                  <span class="order-icon salmon"></span>
                  <span class="order-count">3/6</span>
                </div>
                <div class="order-slot">
                  <span class="order-icon egg"></span>
                  <span class="order-count">2/4</span>
                </div>
              </div>
            </div>
            <div class="title-band">
              <div class="title-lockup"><span>Lunchline</span></div>
            </div>
            <span class="token salmon"></span>
            <span class="token egg"></span>
            <span class="token avocado"></span>
          </section>
          <figcaption>Landscape Candidate A</figcaption>
        </figure>

        <figure>
          <section class="artboard hero-landscape variant-b" id="hero-landscape-b">
            <div class="stage-panel"></div>
            <div class="ticket-strip"></div>
            <div class="steam" style="width: 420px; height: 220px; right: 12%; top: 8%"></div>
            <div class="board-shot">
              <img src="./lunchline_1280x720-screenshot-1.png" alt="" />
            </div>
            <div class="order-card">
              <div class="order-top">
                <span class="order-brand">Lunchline</span>
                <span class="order-pill">Order Up</span>
              </div>
              <div class="meter"></div>
              <div class="order-grid">
                <div class="order-slot">
                  <span class="order-icon salmon"></span>
                  <span class="order-count">6/7</span>
                </div>
                <div class="order-slot">
                  <span class="order-icon egg"></span>
                  <span class="order-count">4/6</span>
                </div>
              </div>
            </div>
            <div class="title-band">
              <div class="title-lockup"><span>Lunchline</span></div>
            </div>
            <span class="token cucumber"></span>
            <span class="token salmon"></span>
            <span class="token egg"></span>
          </section>
          <figcaption>Landscape Candidate B</figcaption>
        </figure>

        <figure>
          <section class="artboard hero-landscape variant-c" id="hero-landscape-c">
            <div class="stage-panel"></div>
            <div class="ticket-strip"></div>
            <div class="steam" style="width: 360px; height: 180px; left: 44%; top: 44%"></div>
            <div class="board-shot">
              <img src="./lunchline_1280x720-screenshot-1.png" alt="" />
            </div>
            <div class="order-card">
              <div class="order-top">
                <span class="order-brand">Lunchline</span>
                <span class="order-pill">Serve Fast</span>
              </div>
              <div class="meter"></div>
              <div class="order-grid">
                <div class="order-slot">
                  <span class="order-icon avocado"></span>
                  <span class="order-count">4/6</span>
                </div>
                <div class="order-slot">
                  <span class="order-icon egg"></span>
                  <span class="order-count">3/5</span>
                </div>
              </div>
            </div>
            <div class="title-band">
              <div class="title-lockup"><span>Lunchline</span></div>
            </div>
            <span class="token avocado"></span>
            <span class="token egg"></span>
            <span class="token salmon"></span>
          </section>
          <figcaption>Landscape Candidate C</figcaption>
        </figure>
      </section>

      <section class="row">
        <figure>
          <section class="artboard hero-portrait variant-b" id="hero-portrait-b">
            <div class="stage-panel"></div>
            <div class="ticket-strip"></div>
            <div class="steam"></div>
            <div class="board-shot">
              <img src="./lunchline_720x1280-screenshot-1.png" alt="" />
            </div>
            <div class="order-card">
              <div class="order-top">
                <span class="order-brand">Lunchline</span>
                <span class="order-pill">Portrait Rush</span>
              </div>
              <div class="meter"></div>
              <div class="order-grid">
                <div class="order-slot">
                  <span class="order-icon salmon"></span>
                  <span class="order-count">5/7</span>
                </div>
                <div class="order-slot">
                  <span class="order-icon avocado"></span>
                  <span class="order-count">6/6</span>
                </div>
              </div>
            </div>
            <div class="title-band">
              <div class="title-lockup"><span>Lunchline</span></div>
            </div>
            <span class="token cucumber"></span>
            <span class="token salmon"></span>
            <span class="token egg"></span>
          </section>
          <figcaption>Portrait Final</figcaption>
        </figure>

        <figure>
          <section class="artboard icon" id="icon-b">
            <div class="stage-panel"></div>
            <div class="icon-focal">
              <div class="order-card icon-order">
                <div class="meter"></div>
                <div class="order-grid">
                  <div class="order-slot">
                    <span class="order-icon salmon"></span>
                    <span class="order-count">4/6</span>
                  </div>
                  <div class="order-slot">
                    <span class="order-icon egg"></span>
                    <span class="order-count">2/4</span>
                  </div>
                </div>
              </div>
              <div class="board-shot">
                <img src="./lunchline_720x1280-screenshot-2.png" alt="" />
              </div>
            </div>
            <span class="token salmon"></span>
            <span class="token egg"></span>
            <span class="token avocado"></span>
          </section>
          <figcaption>Icon Final</figcaption>
        </figure>
      </section>
    </main>
  </body>
</html>
