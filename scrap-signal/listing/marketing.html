<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Scrap Signal Marketing Art</title>
    <style>
      :root {
        --sea-0: #02070e;
        --sea-1: #07121f;
        --sea-2: #0e2133;
        --sea-3: #15415f;
        --spray: rgba(194, 233, 255, 0.32);
        --panel: rgba(5, 13, 22, 0.82);
        --panel-border: rgba(191, 235, 255, 0.14);
        --cyan: #6be7ff;
        --cyan-deep: #1ca3d4;
        --rust: #cb6748;
        --rust-deep: #7d3424;
        --amber: #f8c95d;
        --amber-deep: #db8c30;
        --white: #f6fbff;
        --shadow: rgba(0, 0, 0, 0.44);
      }

      * {
        box-sizing: border-box;
      }

      html,
      body {
        margin: 0;
        min-height: 100%;
      }

      body {
        padding: 28px;
        background:
          radial-gradient(
            circle at 16% 10%,
            rgba(107, 231, 255, 0.16),
            transparent 18%
          ),
          radial-gradient(
            circle at 82% 16%,
            rgba(248, 201, 93, 0.1),
            transparent 18%
          ),
          linear-gradient(180deg, #0a1624, #040910 58%, #02060b);
        color: var(--white);
        font-family: "Avenir Next", "Trebuchet MS", sans-serif;
      }

      .sheet {
        display: grid;
        gap: 24px;
        max-width: 2040px;
        margin: 0 auto;
      }

      .sheet__grid {
        display: grid;
        grid-template-columns: repeat(3, minmax(0, 1fr));
        gap: 24px;
      }

      figure {
        margin: 0;
        display: grid;
        gap: 10px;
      }

      figcaption {
        font-size: 17px;
        letter-spacing: 0.15em;
        text-transform: uppercase;
        color: rgba(228, 247, 255, 0.82);
      }

      .artboard {
        position: relative;
        overflow: hidden;
        border-radius: 40px;
        isolation: isolate;
        background:
          radial-gradient(
            circle at 50% 44%,
            rgba(107, 231, 255, 0.14),
            transparent 24%
          ),
          linear-gradient(
            180deg,
            rgba(255, 255, 255, 0.05),
            rgba(255, 255, 255, 0)
          ),
          linear-gradient(
            180deg,
            var(--sea-3),
            var(--sea-2) 36%,
            var(--sea-1) 72%,
            var(--sea-0)
          );
        box-shadow:
          0 34px 100px var(--shadow),
          inset 0 0 0 1px rgba(196, 237, 255, 0.12);
      }

      .artboard::before,
      .artboard::after {
        content: "";
        position: absolute;
        inset: 0;
        pointer-events: none;
      }

      .artboard::before {
        background:
          radial-gradient(
            circle at 18% 15%,
            rgba(255, 255, 255, 0.14),
            transparent 16%
          ),
          radial-gradient(
            circle at 84% 16%,
            rgba(248, 201, 93, 0.08),
            transparent 14%
          ),
          repeating-linear-gradient(
            108deg,
            rgba(255, 255, 255, 0.065) 0 2px,
            transparent 2px 30px
          );
        opacity: 0.72;
      }

      .artboard::after {
        background:
          linear-gradient(
            180deg,
            rgba(0, 0, 0, 0.02),
            transparent 18%,
            transparent 80%,
            rgba(0, 0, 0, 0.34)
          ),
          radial-gradient(
            circle at center,
            transparent 58%,
            rgba(2, 6, 10, 0.24) 100%
          );
      }

      .hero-landscape {
        width: 1600px;
        height: 900px;
      }

      .hero-portrait {
        width: 1080px;
        height: 1920px;
      }

      .icon {
        width: 1024px;
        height: 1024px;
      }

      .ocean,
      .beacon-stack,
      .beacon-core,
      .ring,
      .ray,
      .shot,
      .shot img,
      .battery,
      .drone,
      .skiff,
      .path,
      .title-band,
      .title-lockup {
        position: absolute;
      }

      .ocean {
        inset: 0;
        background:
          radial-gradient(
            circle at 50% 72%,
            rgba(107, 231, 255, 0.09),
            transparent 20%
          ),
          radial-gradient(
            circle at 52% 52%,
            rgba(107, 231, 255, 0.12),
            transparent 14%
          ),
          linear-gradient(
            180deg,
            rgba(255, 255, 255, 0),
            rgba(255, 255, 255, 0.05)
          ),
          linear-gradient(
            180deg,
            #1b5475 0%,
            #123047 24%,
            #091523 68%,
            #05080d 100%
          );
      }

      .ocean::before,
      .ocean::after {
        content: "";
        position: absolute;
        inset: 0;
      }

      .ocean::before {
        background:
          linear-gradient(
            180deg,
            rgba(255, 255, 255, 0.08),
            transparent 18%,
            transparent 82%,
            rgba(0, 0, 0, 0.18)
          ),
          repeating-linear-gradient(
            0deg,
            transparent 0 52px,
            rgba(150, 211, 255, 0.045) 52px 54px
          );
        opacity: 0.9;
      }

      .ocean::after {
        background:
          radial-gradient(
            circle at 50% 52%,
            rgba(107, 231, 255, 0.12),
            transparent 22%
          ),
          radial-gradient(
            circle at 62% 68%,
            rgba(248, 201, 93, 0.06),
            transparent 18%
          );
      }

      .beacon-stack {
        filter: drop-shadow(0 0 42px rgba(107, 231, 255, 0.35));
      }

      .beacon-core {
        border-radius: 50%;
        background: radial-gradient(
          circle at 40% 40%,
          white 0 10%,
          rgba(255, 255, 255, 0.94) 10% 22%,
          rgba(107, 231, 255, 0.94) 22% 54%,
          rgba(28, 163, 212, 0.8) 54% 72%,
          rgba(28, 163, 212, 0) 100%
        );
        box-shadow:
          0 0 64px rgba(107, 231, 255, 0.48),
          0 0 0 14px rgba(107, 231, 255, 0.12);
      }

      .ring {
        border-radius: 50%;
        border: 2px solid rgba(107, 231, 255, 0.24);
        box-shadow:
          0 0 30px rgba(107, 231, 255, 0.1),
          inset 0 0 24px rgba(107, 231, 255, 0.04);
      }

      .ring--amber {
        border-color: rgba(248, 201, 93, 0.18);
      }

      .ray {
        border-radius: 999px;
        background: linear-gradient(
          90deg,
          rgba(107, 231, 255, 0),
          rgba(107, 231, 255, 0.72),
          rgba(107, 231, 255, 0)
        );
        box-shadow: 0 0 26px rgba(107, 231, 255, 0.28);
        transform-origin: center;
      }

      .shot {
        overflow: hidden;
        border-radius: 32px;
        background:
          linear-gradient(
            180deg,
            rgba(255, 255, 255, 0.08),
            rgba(255, 255, 255, 0)
          ),
          rgba(5, 13, 22, 0.76);
        box-shadow:
          0 30px 60px rgba(0, 0, 0, 0.34),
          inset 0 0 0 1px rgba(194, 233, 255, 0.14);
      }

      .shot img {
        inset: 0;
        width: 100%;
        height: 100%;
        object-fit: cover;
        filter: saturate(1.16) contrast(1.08) brightness(1.04);
      }

      .shot::after {
        content: "";
        position: absolute;
        inset: 0;
        background:
          linear-gradient(
            180deg,
            rgba(255, 255, 255, 0.18),
            transparent 18%,
            transparent 82%,
            rgba(0, 0, 0, 0.28)
          ),
          linear-gradient(
            90deg,
            rgba(255, 255, 255, 0.1),
            transparent 22%,
            transparent 78%,
            rgba(107, 231, 255, 0.08)
          );
        mix-blend-mode: screen;
      }

      .battery {
        border-radius: 999px;
        background:
          linear-gradient(
            180deg,
            rgba(255, 255, 255, 0.22),
            rgba(255, 255, 255, 0)
          ),
          linear-gradient(180deg, var(--amber), var(--amber-deep));
        box-shadow:
          0 16px 28px rgba(0, 0, 0, 0.26),
          0 0 18px rgba(248, 201, 93, 0.22);
      }

      .battery::after {
        content: "";
        position: absolute;
        right: 12%;
        top: 22%;
        bottom: 22%;
        width: 10%;
        border-radius: 999px;
        background: rgba(255, 255, 255, 0.32);
      }

      .drone {
        background:
          linear-gradient(
            180deg,
            rgba(255, 255, 255, 0.14),
            rgba(255, 255, 255, 0)
          ),
          linear-gradient(180deg, var(--rust), var(--rust-deep));
        clip-path: polygon(
          50% 0%,
          92% 26%,
          100% 58%,
          70% 100%,
          30% 100%,
          0% 58%,
          8% 26%
        );
        box-shadow:
          0 12px 24px rgba(0, 0, 0, 0.28),
          0 0 18px rgba(203, 103, 72, 0.18);
      }

      .drone::after {
        content: "";
        position: absolute;
        left: 28%;
        right: 28%;
        top: 30%;
        bottom: 26%;
        border-radius: 50%;
        background: rgba(255, 246, 236, 0.18);
      }

      .skiff {
        background: linear-gradient(
          180deg,
          rgba(255, 255, 255, 0.92),
          rgba(198, 218, 229, 0.88)
        );
        clip-path: polygon(8% 58%, 80% 38%, 94% 50%, 80% 62%, 8% 80%, 0% 68%);
        box-shadow:
          0 12px 22px rgba(0, 0, 0, 0.26),
          0 0 16px rgba(255, 255, 255, 0.16);
      }

      .path {
        border-radius: 999px;
        border: 2px dashed rgba(107, 231, 255, 0.32);
        border-left-color: transparent;
        border-bottom-color: transparent;
        transform: rotate(-8deg);
      }

      .title-band {
        z-index: 5;
        border-radius: 32px;
        background:
          linear-gradient(
            180deg,
            rgba(255, 255, 255, 0.12),
            rgba(255, 255, 255, 0)
          ),
          linear-gradient(180deg, rgba(10, 21, 34, 0.88), rgba(6, 14, 24, 0.9));
        box-shadow:
          0 26px 56px rgba(0, 0, 0, 0.3),
          inset 0 0 0 1px rgba(194, 233, 255, 0.14);
        backdrop-filter: blur(18px);
      }

      .title-lockup {
        inset: 0;
        display: grid;
        place-items: center;
        text-align: center;
      }

      .title-lockup span {
        display: block;
        line-height: 0.88;
        text-transform: uppercase;
        letter-spacing: 0.08em;
        font-weight: 900;
        color: var(--white);
        text-shadow:
          0 18px 40px rgba(0, 0, 0, 0.42),
          0 2px 0 rgba(255, 255, 255, 0.08);
      }

      .title-lockup span + span {
        margin-top: 0.08em;
      }

      .hero-landscape .title-band {
        left: 13%;
        right: 13%;
        top: 31%;
        height: 24%;
      }

      .hero-landscape .title-lockup span {
        font-size: 136px;
      }

      .hero-landscape .beacon-stack {
        left: 9%;
        top: 18%;
        width: 44%;
        height: 58%;
      }

      .hero-landscape .beacon-core {
        left: 32%;
        top: 34%;
        width: 30%;
        height: 30%;
      }

      .hero-landscape .ring--1 {
        inset: 8% 12%;
      }

      .hero-landscape .ring--2 {
        inset: 20% 24%;
      }

      .hero-landscape .ring--3 {
        inset: 0;
      }

      .hero-landscape .ray--1 {
        left: 18%;
        right: 12%;
        top: 47%;
        height: 1.4%;
      }

      .hero-landscape .ray--2 {
        left: 24%;
        right: 20%;
        top: 37%;
        height: 1.2%;
        transform: rotate(22deg);
      }

      .hero-landscape .main-shot {
        right: 5.8%;
        top: 17%;
        width: 54%;
        height: 56%;
        transform: rotate(-5deg);
      }

      .hero-landscape .main-shot img {
        object-position: 54% 48%;
      }

      .hero-landscape .secondary-shot {
        left: 11%;
        bottom: 10%;
        width: 28%;
        height: 24%;
        transform: rotate(6deg);
      }

      .hero-landscape .secondary-shot img {
        object-position: 50% 54%;
      }

      .hero-landscape .battery--1 {
        left: 6%;
        bottom: 18%;
        width: 4.6%;
        height: 13%;
        transform: rotate(-12deg);
      }

      .hero-landscape .battery--2 {
        right: 10%;
        top: 18%;
        width: 4.2%;
        height: 11%;
        transform: rotate(18deg);
      }

      .hero-landscape .drone--1 {
        right: 18%;
        bottom: 12%;
        width: 9%;
        height: 16%;
        transform: rotate(12deg);
      }

      .hero-landscape .drone--2 {
        left: 40%;
        top: 12%;
        width: 7%;
        height: 12%;
        transform: rotate(-22deg);
      }

      .hero-landscape .skiff {
        left: 36%;
        top: 56%;
        width: 10%;
        height: 7%;
        transform: rotate(-22deg);
      }

      .hero-landscape .path {
        left: 22%;
        top: 45%;
        width: 18%;
        height: 18%;
      }

      .hero-portrait .title-band {
        left: 10%;
        right: 10%;
        top: 34%;
        height: 17%;
      }

      .hero-portrait .title-lockup span {
        font-size: 118px;
      }

      .hero-portrait .beacon-stack {
        left: 8%;
        right: 8%;
        top: 16%;
        bottom: 22%;
      }

      .hero-portrait .beacon-core {
        left: 37%;
        top: 30%;
        width: 26%;
        height: 26%;
      }

      .hero-portrait .ring--1 {
        inset: 10% 8%;
      }

      .hero-portrait .ring--2 {
        inset: 22% 20%;
      }

      .hero-portrait .ring--3 {
        inset: 0;
      }

      .hero-portrait .ray--1 {
        left: 17%;
        right: 17%;
        top: 42%;
        height: 1%;
      }

      .hero-portrait .ray--2 {
        left: 28%;
        right: 28%;
        top: 32%;
        height: 1%;
        transform: rotate(25deg);
      }

      .hero-portrait .main-shot {
        left: 14%;
        right: 14%;
        top: 52%;
        height: 28%;
        transform: rotate(-5deg);
      }

      .hero-portrait .main-shot img {
        object-position: 52% 48%;
      }

      .hero-portrait .secondary-shot {
        left: 23%;
        right: 23%;
        top: 17%;
        height: 13%;
        transform: rotate(4deg);
      }

      .hero-portrait .secondary-shot img {
        object-position: 50% 54%;
      }

      .hero-portrait .battery--1 {
        left: 14%;
        bottom: 21%;
        width: 8%;
        height: 9%;
        transform: rotate(-16deg);
      }

      .hero-portrait .battery--2 {
        right: 13%;
        top: 56%;
        width: 7%;
        height: 8%;
        transform: rotate(16deg);
      }

      .hero-portrait .drone--1 {
        right: 16%;
        top: 22%;
        width: 12%;
        height: 8%;
        transform: rotate(18deg);
      }

      .hero-portrait .drone--2 {
        left: 14%;
        top: 58%;
        width: 11%;
        height: 7%;
        transform: rotate(-20deg);
      }

      .hero-portrait .skiff {
        left: 46%;
        top: 48%;
        width: 10%;
        height: 4.8%;
        transform: rotate(-20deg);
      }

      .hero-portrait .path {
        left: 31%;
        top: 42%;
        width: 20%;
        height: 14%;
      }

      .icon .beacon-stack {
        left: -6%;
        right: -6%;
        top: 4%;
        bottom: 4%;
      }

      .icon .beacon-core {
        left: 39%;
        top: 36%;
        width: 22%;
        height: 22%;
      }

      .icon .ring--1 {
        inset: 6% 6%;
      }

      .icon .ring--2 {
        inset: 18% 18%;
      }

      .icon .ring--3 {
        inset: 30% 30%;
      }

      .icon .main-shot {
        inset: 0;
        border-radius: 0;
        box-shadow: none;
      }

      .icon .main-shot img {
        object-position: 58% 50%;
        filter: saturate(1.2) contrast(1.1) brightness(1.04);
      }

      .icon .secondary-shot {
        display: none;
      }

      .icon .title-band {
        display: none;
      }

      .icon .ray--1 {
        left: 12%;
        right: 8%;
        top: 48%;
        height: 1.4%;
      }

      .icon .ray--2 {
        left: 22%;
        right: 22%;
        top: 38%;
        height: 1.4%;
        transform: rotate(20deg);
      }

      .icon .battery--1 {
        left: 13%;
        bottom: 18%;
        width: 10%;
        height: 18%;
        transform: rotate(-14deg);
      }

      .icon .battery--2 {
        right: 13%;
        top: 14%;
        width: 9%;
        height: 16%;
        transform: rotate(18deg);
      }

      .icon .drone--1 {
        right: 16%;
        bottom: 11%;
        width: 18%;
        height: 16%;
        transform: rotate(14deg);
      }

      .icon .drone--2 {
        left: 12%;
        top: 14%;
        width: 16%;
        height: 14%;
        transform: rotate(-16deg);
      }

      .icon .skiff {
        left: 44%;
        top: 58%;
        width: 15%;
        height: 8%;
        transform: rotate(-26deg);
      }

      .icon .path {
        left: 28%;
        top: 48%;
        width: 26%;
        height: 20%;
      }
    </style>
  </head>
  <body>
    <main class="sheet">
      <div class="sheet__grid">
        <figure>
          <figcaption>Landscape Hero</figcaption>
          <section class="artboard hero-landscape" id="hero-landscape">
            <div class="ocean"></div>
            <div class="beacon-stack">
              <div class="ring ring--1"></div>
              <div class="ring ring--2 ring--amber"></div>
              <div class="ring ring--3"></div>
              <div class="beacon-core"></div>
              <div class="ray ray--1"></div>
              <div class="ray ray--2"></div>
            </div>

            <div class="shot main-shot">
              <img src="./scrap-signal_1280x720-screenshot-1.png" alt="" />
            </div>
            <div class="shot secondary-shot">
              <img src="./scrap-signal_1280x720-screenshot-2.png" alt="" />
            </div>

            <div class="battery battery--1"></div>
            <div class="battery battery--2"></div>
            <div class="drone drone--1"></div>
            <div class="drone drone--2"></div>
            <div class="skiff"></div>
            <div class="path"></div>

            <div class="title-band">
              <div class="title-lockup">
                <div>
                  <span>Scrap</span>
                  <span>Signal</span>
                </div>
              </div>
            </div>
          </section>
        </figure>

        <figure>
          <figcaption>Portrait Hero</figcaption>
          <section class="artboard hero-portrait" id="hero-portrait">
            <div class="ocean"></div>
            <div class="beacon-stack">
              <div class="ring ring--1"></div>
              <div class="ring ring--2 ring--amber"></div>
              <div class="ring ring--3"></div>
              <div class="beacon-core"></div>
              <div class="ray ray--1"></div>
              <div class="ray ray--2"></div>
            </div>

            <div class="shot secondary-shot">
              <img src="./scrap-signal_1280x720-screenshot-2.png" alt="" />
            </div>
            <div class="shot main-shot">
              <img src="./scrap-signal_1280x720-screenshot-1.png" alt="" />
            </div>

            <div class="battery battery--1"></div>
            <div class="battery battery--2"></div>
            <div class="drone drone--1"></div>
            <div class="drone drone--2"></div>
            <div class="skiff"></div>
            <div class="path"></div>

            <div class="title-band">
              <div class="title-lockup">
                <div>
                  <span>Scrap</span>
                  <span>Signal</span>
                </div>
              </div>
            </div>
          </section>
        </figure>

        <figure>
          <figcaption>Icon</figcaption>
          <section class="artboard icon" id="icon-art">
            <div class="ocean"></div>
            <div class="shot main-shot">
              <img src="./scrap-signal_1280x720-screenshot-1.png" alt="" />
            </div>
            <div class="beacon-stack">
              <div class="ring ring--1"></div>
              <div class="ring ring--2 ring--amber"></div>
              <div class="ring ring--3"></div>
              <div class="beacon-core"></div>
              <div class="ray ray--1"></div>
              <div class="ray ray--2"></div>
            </div>
            <div class="battery battery--1"></div>
            <div class="battery battery--2"></div>
            <div class="drone drone--1"></div>
            <div class="drone drone--2"></div>
            <div class="skiff"></div>
            <div class="path"></div>
          </section>
        </figure>
      </div>
    </main>
  </body>
</html>
