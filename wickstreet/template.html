<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
    <title>Wickstreet</title>
    <style>
      :root {
        color-scheme: dark;
        font-family: "Avenir Next", "Helvetica Neue", system-ui, sans-serif;
        --bg: #08101f;
        --panel: rgba(8, 16, 29, 0.92);
        --panel-border: rgba(57, 81, 115, 0.9);
        --text: #eef4ff;
        --muted: #7e99bb;
        --accent: #f0a53d;
        --warning: #ff8c62;
      }

      * {
        box-sizing: border-box;
        user-select: none;
        -webkit-user-select: none;
      }

      html,
      body {
        width: 100%;
        height: 100%;
        margin: 0;
        overflow: hidden;
        background: var(--bg);
        color: var(--text);
      }

      body {
        touch-action: none;
      }

      #app {
        position: relative;
        width: 100vw;
        height: 100vh;
        overflow: hidden;
      }

      #game-canvas {
        display: block;
        width: 100%;
        height: 100%;
      }

      .ui-layer {
        position: absolute;
        inset: 0;
        pointer-events: none;
      }

      .hud-row {
        position: absolute;
        left: 18px;
        right: 18px;
        display: flex;
        justify-content: space-between;
        gap: 12px;
      }

      .hud-row-top {
        top: max(18px, env(safe-area-inset-top));
      }

      .hud-pill {
        display: flex;
        align-items: center;
        gap: 10px;
        padding: 12px 16px;
        border-radius: 20px;
        border: 1px solid var(--panel-border);
        background: var(--panel);
        backdrop-filter: blur(10px);
        box-shadow: 0 8px 24px rgba(3, 8, 16, 0.26);
      }

      .hud-score {
        min-width: 146px;
      }

      .hud-blackout {
        min-width: 160px;
        justify-content: space-between;
      }

      .hud-label {
        font-size: 11px;
        font-weight: 700;
        letter-spacing: 0.14em;
        color: var(--muted);
      }

      .hud-value {
        font-size: 28px;
        font-weight: 800;
        letter-spacing: 0.02em;
      }

      .strike-row {
        display: inline-flex;
        gap: 6px;
      }

      .strike-dot {
        width: 14px;
        height: 14px;
        border-radius: 999px;
        background: rgba(74, 88, 110, 0.9);
      }

      .strike-dot.is-active {
        background: var(--warning);
      }

      .request-strip {
        position: absolute;
        left: 18px;
        bottom: max(18px, env(safe-area-inset-bottom));
        display: flex;
        gap: 12px;
      }

      .request-card {
        min-width: 188px;
        padding: 12px 16px;
        border-radius: 22px;
        border: 1px solid var(--panel-border);
        background: var(--panel);
        box-shadow: 0 8px 24px rgba(3, 8, 16, 0.26);
      }

      .request-label {
        display: block;
        margin-bottom: 8px;
        font-size: 11px;
        font-weight: 700;
        letter-spacing: 0.14em;
        color: var(--muted);
      }

      .request-main {
        display: flex;
        align-items: center;
        gap: 10px;
      }

      .sigil-chip {
        display: inline-flex;
        align-items: center;
        justify-content: center;
        width: 44px;
        height: 44px;
        border-radius: 14px;
        background: rgba(12, 23, 40, 0.85);
        color: var(--sigil-color, #fff);
        border: 1px solid rgba(94, 120, 160, 0.45);
        font-size: 12px;
        font-weight: 800;
        letter-spacing: 0.08em;
      }

      .request-name {
        font-size: 20px;
        font-weight: 800;
        letter-spacing: 0.03em;
      }

      .timer-ring {
        margin-left: auto;
        width: 34px;
        height: 34px;
        border-radius: 999px;
        background:
          radial-gradient(circle at center, rgba(8, 16, 29, 1) 56%, transparent 58%),
          conic-gradient(var(--timer-color, var(--accent)) calc(var(--timer-progress, 1) * 1turn), rgba(69, 89, 118, 0.32) 0);
      }

      .overlay-card,
      .rotate-card {
        position: absolute;
        pointer-events: auto;
        border-radius: 28px;
        border: 1px solid rgba(82, 112, 151, 0.95);
        background: rgba(8, 16, 29, 0.9);
        backdrop-filter: blur(12px);
        box-shadow: 0 18px 48px rgba(2, 7, 14, 0.34);
      }

      .overlay-card[hidden],
      .rotate-card[hidden] {
        display: none;
      }

      .overlay-card-start {
        top: max(18px, env(safe-area-inset-top) + 6px);
        left: 18px;
        width: min(440px, calc(100vw - 36px));
        padding: 22px 24px;
      }

      .overlay-card-gameover {
        left: 50%;
        top: 50%;
        width: min(420px, calc(100vw - 40px));
        padding: 22px 24px;
        transform: translate(-50%, -50%);
      }

      .rotate-card {
        left: 50%;
        top: 50%;
        width: min(360px, calc(100vw - 40px));
        padding: 22px 24px;
        transform: translate(-50%, -50%);
      }

      .overlay-title {
        font-size: clamp(24px, 4vw, 40px);
        font-weight: 800;
        letter-spacing: 0.03em;
      }

      .overlay-copy {
        margin-top: 10px;
        font-size: 15px;
        line-height: 1.4;
        color: #cfdbee;
      }

      .overlay-stats {
        display: grid;
        gap: 10px;
        margin: 16px 0 18px;
      }

      .overlay-stats div {
        display: flex;
        justify-content: space-between;
        align-items: baseline;
      }

      .overlay-stats strong {
        font-size: 28px;
      }

      .overlay-button {
        margin-top: 18px;
        min-width: 136px;
        padding: 13px 18px;
        border: 0;
        border-radius: 16px;
        background: var(--accent);
        color: #162238;
        font-size: 16px;
        font-weight: 800;
        letter-spacing: 0.08em;
      }

      @media (max-width: 900px) {
        .hud-row {
          left: 12px;
          right: 12px;
        }

        .request-strip {
          left: 12px;
          bottom: max(12px, env(safe-area-inset-bottom));
          gap: 10px;
        }

        .request-card {
          min-width: 170px;
          padding: 10px 12px;
        }

        .hud-value {
          font-size: 22px;
        }

        .request-name {
          font-size: 16px;
        }

        .sigil-chip {
          width: 38px;
          height: 38px;
        }
      }
    </style>
  </head>
  <body>
    <div id="app">
      <canvas id="game-canvas"></canvas>
    </div>
    <script src="https://assets.playdrop.ai/sdk/playdrop.js"></script>
    <!-- APP_SCRIPT -->
  </body>
</html>
