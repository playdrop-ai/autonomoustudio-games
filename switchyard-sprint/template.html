<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
    <title>Switchyard Sprint</title>
    <link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 64 64'%3E%3Ccircle cx='32' cy='32' r='30' fill='%23122b3a'/%3E%3Cpath d='M14 39h36v6H14z' fill='%23edf7fb'/%3E%3Cpath d='M20 19h14l10 10v10H20z' fill='%2358b6ff'/%3E%3Ccircle cx='24' cy='48' r='5' fill='%23ffd166'/%3E%3Ccircle cx='42' cy='48' r='5' fill='%23ffd166'/%3E%3C/svg%3E" />
    <style>
      :root {
        color-scheme: dark;
        --bg-top: #0b2030;
        --bg-bottom: #122838;
        --panel: rgba(7, 24, 34, 0.82);
        --panel-border: rgba(181, 224, 244, 0.16);
        --ink: #edf7fb;
        --muted: #a6c3d1;
        --accent-red: #ff6c63;
        --accent-blue: #58b6ff;
        --accent-green: #67db94;
        --accent-amber: #ffd166;
        --shadow: rgba(0, 0, 0, 0.28);
      }

      * {
        box-sizing: border-box;
      }

      html,
      body {
        margin: 0;
        min-height: 100%;
        overflow: hidden;
        background:
          radial-gradient(circle at top, rgba(132, 201, 255, 0.14), transparent 34%),
          linear-gradient(180deg, var(--bg-top), var(--bg-bottom));
        color: var(--ink);
        font-family: "Trebuchet MS", "Gill Sans", sans-serif;
      }

      body::before,
      body::after {
        content: "";
        position: fixed;
        inset: auto;
        pointer-events: none;
        filter: blur(12px);
      }

      body::before {
        width: 40vw;
        height: 40vw;
        top: -10vw;
        left: -8vw;
        background: rgba(88, 182, 255, 0.14);
        border-radius: 50%;
      }

      body::after {
        width: 30vw;
        height: 30vw;
        right: -5vw;
        bottom: -5vw;
        background: rgba(255, 209, 102, 0.11);
        border-radius: 50%;
      }

      button,
      input,
      select {
        font: inherit;
      }

      #app {
        position: fixed;
        inset: 0;
      }
    </style>
  </head>
  <body>
    <div id="app"></div>
    <!-- APP_SCRIPT -->
  </body>
</html>
