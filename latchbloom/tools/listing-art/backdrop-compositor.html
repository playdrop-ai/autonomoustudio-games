<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
    <title>Latchbloom Backdrop Compositor</title>
    <style>
      :root {
        --bg: #09131d;
      }

      * {
        box-sizing: border-box;
      }

      html,
      body {
        margin: 0;
        width: 100%;
        height: 100%;
        overflow: hidden;
        background: var(--bg);
      }

      body {
        position: relative;
      }

      body.variant-landscape {
        width: 1600px;
        height: 900px;
      }

      body.variant-portrait {
        width: 1080px;
        height: 1920px;
      }

      .stage {
        position: relative;
        width: 100%;
        height: 100%;
        overflow: hidden;
        background:
          radial-gradient(circle at 18% 18%, rgba(111, 228, 208, 0.24), rgba(111, 228, 208, 0) 34%),
          radial-gradient(circle at 84% 22%, rgba(255, 203, 110, 0.26), rgba(255, 203, 110, 0) 28%),
          linear-gradient(180deg, #09131d 0%, #13253a 46%, #172132 100%);
      }

      .bg,
      .bg-soft {
        position: absolute;
        inset: 0;
        width: 100%;
        height: 100%;
        object-fit: cover;
      }

      .bg {
        filter: saturate(1.04) contrast(1.03);
      }

      .bg-soft {
        filter: blur(18px) saturate(1.08);
        opacity: 0.32;
        transform: scale(1.08);
      }

      .board-soften {
        position: absolute;
        inset: var(--board-top) var(--board-right) var(--board-bottom) var(--board-left);
        overflow: hidden;
        border-radius: 42px;
        box-shadow:
          inset 0 0 0 2px rgba(237, 247, 241, 0.12),
          inset 0 0 0 14px rgba(9, 24, 33, 0.1),
          0 36px 80px rgba(5, 10, 16, 0.34);
      }

      body.variant-portrait .board-soften {
        border-radius: 54px;
      }

      .board-soften .panel-image {
        position: absolute;
        inset: 0;
        width: 100%;
        height: 100%;
        object-fit: cover;
        filter: blur(16px) brightness(0.56) saturate(0.78);
        transform: scale(1.1);
      }

      .board-soften::after {
        content: "";
        position: absolute;
        inset: 0;
        background:
          linear-gradient(180deg, rgba(17, 50, 70, 0.54) 0%, rgba(9, 24, 34, 0.7) 100%),
          radial-gradient(circle at 50% 18%, rgba(219, 243, 234, 0.1), rgba(219, 243, 234, 0) 34%);
      }

      .pane-lines,
      .vignette,
      .sparkles {
        position: absolute;
        inset: 0;
        pointer-events: none;
      }

      .pane-lines {
        background:
          linear-gradient(90deg, rgba(240, 248, 239, 0.08) 0 0.4%, transparent 0.4% 100%) 8% 0 / 18% 100% repeat-x;
        opacity: 0.28;
      }

      .sparkles {
        background:
          radial-gradient(circle at 16% 74%, rgba(255, 243, 208, 0.12), rgba(255, 243, 208, 0) 14%),
          radial-gradient(circle at 88% 26%, rgba(255, 243, 208, 0.14), rgba(255, 243, 208, 0) 12%),
          radial-gradient(circle at 72% 82%, rgba(158, 227, 207, 0.18), rgba(158, 227, 207, 0) 18%);
      }

      .vignette {
        box-shadow: inset 0 0 180px rgba(4, 8, 14, 0.46);
      }
    </style>
  </head>
  <body class="variant-landscape">
    <div class="stage">
      <img class="bg-soft" alt="" />
      <img class="bg" alt="" />
      <div class="board-soften">
        <img class="panel-image" alt="" />
      </div>
      <div class="pane-lines"></div>
      <div class="sparkles"></div>
      <div class="vignette"></div>
    </div>
    <script>
      const params = new URLSearchParams(window.location.search);
      const variant = params.get("variant") === "portrait" ? "portrait" : "landscape";
      const bg = params.get("bg") || "";
      const defaults =
        variant === "portrait"
          ? { left: "8.5%", top: "13.5%", width: "83%", height: "78%" }
          : { left: "27.6%", top: "8%", width: "44.8%", height: "84%" };

      document.body.className = `variant-${variant}`;
      document.documentElement.style.setProperty("--board-left", params.get("left") || defaults.left);
      document.documentElement.style.setProperty("--board-top", params.get("top") || defaults.top);
      document.documentElement.style.setProperty(
        "--board-right",
        `calc(100% - (${params.get("left") || defaults.left} + ${params.get("width") || defaults.width}))`,
      );
      document.documentElement.style.setProperty(
        "--board-bottom",
        `calc(100% - (${params.get("top") || defaults.top} + ${params.get("height") || defaults.height}))`,
      );

      document.querySelector(".bg-soft").src = bg;
      document.querySelector(".bg").src = bg;
      document.querySelector(".panel-image").src = bg;
    </script>
  </body>
</html>
