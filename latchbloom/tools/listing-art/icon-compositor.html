<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Latchbloom Icon Compositor</title>
    <style>
      :root {
        --bg: #09131d;
      }

      * {
        box-sizing: border-box;
      }

      html,
      body {
        margin: 0;
        width: 1024px;
        height: 1024px;
        overflow: hidden;
        background: var(--bg);
      }

      body {
        position: relative;
      }

      .stage {
        position: relative;
        width: 100%;
        height: 100%;
        overflow: hidden;
        background:
          radial-gradient(circle at 18% 18%, rgba(111, 228, 208, 0.24), rgba(111, 228, 208, 0) 34%),
          radial-gradient(circle at 84% 22%, rgba(255, 203, 110, 0.26), rgba(255, 203, 110, 0) 28%),
          linear-gradient(180deg, #09131d 0%, #13253a 46%, #172132 100%);
      }

      .background,
      .background-glow {
        position: absolute;
        inset: 0;
        width: 100%;
        height: 100%;
        object-fit: cover;
      }

      .background {
        filter: saturate(1.06) blur(2px);
        transform: scale(1.14);
      }

      .background-glow {
        filter: saturate(1.12) brightness(0.94) blur(22px);
        opacity: 0.48;
        transform: scale(1.26);
      }

      .medallion-shadow {
        position: absolute;
        inset: 20% 20%;
        border-radius: 42%;
        background: radial-gradient(circle, rgba(255, 216, 128, 0.12), rgba(255, 216, 128, 0) 72%);
        filter: blur(18px);
      }

      .emblem-wrap {
        position: absolute;
        inset: 14%;
        display: grid;
        place-items: center;
      }

      .emblem-wrap::before {
        content: "";
        position: absolute;
        inset: 7%;
        border-radius: 36%;
        background:
          radial-gradient(circle at 50% 42%, rgba(210, 247, 237, 0.14), rgba(210, 247, 237, 0) 52%),
          linear-gradient(180deg, rgba(9, 28, 37, 0.18), rgba(9, 28, 37, 0.42));
        box-shadow:
          inset 0 0 0 2px rgba(240, 247, 239, 0.08),
          0 28px 80px rgba(6, 13, 20, 0.48);
      }

      .emblem {
        position: relative;
        width: 80%;
        height: 80%;
        object-fit: cover;
        transform: scale(1.18);
        clip-path: circle(41% at 50% 50%);
        filter: drop-shadow(0 26px 48px rgba(8, 14, 20, 0.4));
      }

      .vignette,
      .sparkle {
        position: absolute;
        inset: 0;
        pointer-events: none;
      }

      .vignette {
        box-shadow: inset 0 0 160px rgba(4, 8, 14, 0.52);
      }

      .sparkle {
        background:
          radial-gradient(circle at 18% 74%, rgba(255, 242, 200, 0.12), rgba(255, 242, 200, 0) 14%),
          radial-gradient(circle at 84% 28%, rgba(255, 242, 200, 0.14), rgba(255, 242, 200, 0) 12%),
          radial-gradient(circle at 68% 84%, rgba(158, 227, 207, 0.16), rgba(158, 227, 207, 0) 16%);
      }
    </style>
  </head>
  <body>
    <div class="stage">
      <img class="background-glow" alt="" />
      <img class="background" alt="" />
      <div class="medallion-shadow"></div>
      <div class="emblem-wrap">
        <img class="emblem" alt="" />
      </div>
      <div class="sparkle"></div>
      <div class="vignette"></div>
    </div>
    <script>
      const params = new URLSearchParams(window.location.search);
      const bg = params.get("bg") || "";
      const emblem = params.get("emblem") || "";
      document.querySelector(".background-glow").src = bg;
      document.querySelector(".background").src = bg;
      document.querySelector(".emblem").src = emblem;
    </script>
  </body>
</html>
